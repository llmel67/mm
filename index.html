<!DOCTYPE html>
<html>
  <head>
    <style>
      html, body {
        height: 100%;
      }

      * { 
        box-sizing: border-box; 
        margin: 0;
        padding: 0;
      }

      body {
        background-color: #E8CDD8;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
      }

      p {
        color: white;
        font-family: 'Courier New', Courier, monospace;
        font-size: 27px;
        font-weight: 600;
        max-width: 400px;
        text-align: center;
        word-wrap: break-word;
      }

      button {
        width: 260px;
        padding: 10px;
        margin-top: 20px;
        font-size: 28px;
        background-color: pink;
        border-radius: 15px;
        border: 4px solid rgba(213,133, 155);
        cursor: pointer;
      }

      button:hover {
        background-color: rgb(250, 104, 157);
      }

      button:active {
        background-color: rgb(248, 162, 193);
        border-color: pink;
        color: white;
      }
    </style>
  </head>
  
  <body>
    <p id="text">
      oi... eu queria pergunta uma coisa... <br> vc quer?
    </p>

    <audio id="audio" src="https://www.myinstants.com//media/sounds/olha-o-porcoo-estourado.mp3" preload="auto"></audio>

    <button id="playButton" onclick="olhaOPorco()">toca aqui 🤍</button>
  </body>
  
  <script>
    var audio = document.getElementById('audio');
    var playButton = document.getElementById('playButton');
    var text = document.getElementById("text");
    
    function olhaOPorco() {
      audio.play();
      text.textContent = "te amo mas a gnt ja namora :3";
      playButton.style.display = "none";
    }
  </script>
</html>
